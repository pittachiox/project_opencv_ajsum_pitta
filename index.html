<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking - Web Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --empty-color: #28a745;
            --normal-color: #ffc107;
            --violation-color: #dc3545;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .status-badge {
            background-color: var(--empty-color);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .dashboard {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .video-section {
            flex: 2;
            min-width: 600px;
            background: var(--panel-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .video-container {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .sidebar {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .stat-card {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-title {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
        }

        .stat-empty {
            border-bottom: 4px solid var(--empty-color);
        }

        .stat-empty .stat-value {
            color: var(--empty-color);
        }

        .stat-normal {
            border-bottom: 4px solid var(--normal-color);
        }

        .stat-normal .stat-value {
            color: var(--normal-color);
        }

        .stat-violation {
            border-bottom: 4px solid var(--violation-color);
        }

        .stat-violation .stat-value {
            color: var(--violation-color);
        }

        .logs-section {
            background: var(--panel-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            flex-grow: 1;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            max-height: 400px;
        }

        .logs-section h2 {
            margin-top: 0;
            font-size: 18px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .logs-container {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        /* Custom Scrollbar */
        .logs-container::-webkit-scrollbar {
            width: 6px;
        }

        .logs-container::-webkit-scrollbar-track {
            background: #2a2a2a;
            border-radius: 4px;
        }

        .logs-container::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .log-item {
            background: #2a2a2a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--violation-color);
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .log-content {
            flex-grow: 1;
            margin-left: 15px;
            font-size: 14px;
        }

        .log-content strong {
            color: #ff6b6b;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #1e1e1e; border: 1px solid #333; border-radius: 12px;
            width: 400px; max-width: 90%; padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: translateY(20px); transition: transform 0.2s;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-header {
            font-size: 18px; font-weight: bold; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333; padding-bottom: 12px;
        }
        .modal-close { background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; }
        .modal-close:hover { color: white; }
        .cam-select-list { display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; }
        .cam-select-btn {
            background: #2a2a2a; border: 1px solid #444; padding: 12px 16px;
            border-radius: 8px; color: white; font-size: 15px; text-align: left;
            cursor: pointer; transition: background 0.15s, border-color 0.15s;
            display: flex; align-items: center; gap: 10px;
        }
        .cam-select-btn:hover { background: #333; border-color: #4caff0; }
        .cam-select-btn .badge {
            background: #4caff0; color: white; font-size: 12px;
            font-weight: bold; padding: 2px 6px; border-radius: 4px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Smart Parking - Control Center</h1>
        <div style="display:flex; gap:10px; align-items:center;">
            <button onclick="showCameraModal()"
                style="background:#4caff0; color:white; padding:7px 14px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:bold;">Parking
                Setup</button>
            <a href="/setup_online"
                style="background:#ffc107; color:#333; padding:7px 14px; border-radius:6px; text-decoration:none; font-size:13px; font-weight:bold;">Camera
                Setup</a>
            <a href="/" style="color:#aaa; text-decoration:none; font-size:13px;">Home</a>
            <div class="status-badge" id="conn-status">Live</div>
        </div>
    </div>

    <div class="dashboard" id="cameras-container">
        <!-- Dynamic Camera Streams will be injected here -->
        <div style="color: #aaa; padding: 20px; width: 100%; text-align: center;">Loading cameras...</div>
    </div>

    <!-- Camera Selection Modal -->
    <div class="modal-overlay" id="cameraModal">
        <div class="modal-content">
            <div class="modal-header">
                <div>เลือกกล้อง / Select Camera</div>
                <button class="modal-close" onclick="hideCameraModal()">&times;</button>
            </div>
            <div class="cam-select-list" id="modalCamList">
                <div style="text-align:center; color:#888; padding: 20px;">Loading cameras...</div>
            </div>
        </div>
    </div>

    <script>
        let camerasData = [];
        let pollingInterval = null;

        async function initCameras() {
            try {
                const response = await fetch('/api/cameras?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();

                const modalList = document.getElementById('modalCamList');
                if (modalList) modalList.innerHTML = '';

                if (Array.isArray(data) && data.length > 0) {
                    camerasData = data;
                    renderCameraGrid();

                    if (modalList) {
                        data.forEach(cam => {
                            const btn = document.createElement('button');
                            btn.className = 'cam-select-btn';
                            btn.innerHTML = `<span class="badge">#${cam.id}</span> ${cam.name || 'Camera ' + cam.id}`;
                            btn.onclick = () => { window.location.href = '/setup_parking?id=' + cam.id; };
                            modalList.appendChild(btn);
                        });
                    }
                    if (pollingInterval) clearInterval(pollingInterval);
                    pollingInterval = setInterval(fetchAllStats, 1000);
                    fetchAllStats();
                } else {
                    document.getElementById('cameras-container').innerHTML = `
                        <div style="color: #aaa; padding: 20px; width: 100%; text-align: center;">
                            No cameras configured. Go to <a href="/setup_online" style="color:#ffc107;">Setup</a> to add a camera.
                        </div>
                    `;
                    if (modalList) modalList.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">No cameras available.</div>';
                }
            } catch (err) {
                console.error("Failed to load cameras", err);
            }
        }

        function showCameraModal() {
            document.getElementById('cameraModal').classList.add('active');
        }

        function hideCameraModal() {
            document.getElementById('cameraModal').classList.remove('active');
        }

        function renderCameraGrid() {
            const container = document.getElementById('cameras-container');
            container.innerHTML = ''; // Clear

            camerasData.forEach(cam => {
                const camId = cam.id;
                const camName = cam.name || `Camera ${camId}`;

                const html = `
                <div class="video-section" id="cam-section-${camId}" style="flex: 1; min-width: 45%; max-width: 100%;">
                    <h3 style="margin-top:0; margin-bottom:10px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                        <span style="color:#28a745" id="cam-status-${camId}">●</span> ${camName} (ID: ${camId})
                    </h3>
                    
                    <div class="video-container" style="aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden;">
                        <img src="/${camId}/video" alt="MJPEG Stream ${camId}" 
                             id="streamImage-${camId}" 
                             style="width: 100%; height: 100%; object-fit: contain;"
                             onerror="handleStreamError(${camId})">
                    </div>
                    
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <!-- Stats Mini Grid -->
                        <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                            <div class="stat-card stat-empty" style="padding: 10px;">
                                <div class="stat-title" style="font-size:10px;">Empty</div>
                                <div class="stat-value" id="val-empty-${camId}" style="font-size:20px;">0</div>
                            </div>
                            <div class="stat-card stat-normal" style="padding: 10px;">
                                <div class="stat-title" style="font-size:10px;">Normal</div>
                                <div class="stat-value" id="val-normal-${camId}" style="font-size:20px;">0</div>
                            </div>
                            <div class="stat-card stat-violation" style="padding: 10px;">
                                <div class="stat-title" style="font-size:10px;">Violation</div>
                                <div class="stat-value" id="val-violation-${camId}" style="font-size:20px;">0</div>
                            </div>
                        </div>
                        
                        <!-- Logs Mini Panel -->
                        <div class="logs-section" style="flex: 1; padding: 10px; margin-top: 0; max-height: 120px;">
                            <div class="logs-container" id="logs-list-${camId}">
                                <div style="font-size:12px; color:#aaa;">Waiting for logs...</div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
                container.innerHTML += html;
            });
        }

        function handleStreamError(camId) {
            const statusIndicator = document.getElementById(`cam-status-${camId}`);
            if (statusIndicator) {
                statusIndicator.style.color = 'var(--violation-color)';
            }
        }

        async function fetchAllStats() {
            camerasData.forEach(async (cam) => {
                try {
                    const response = await fetch(`/api/${cam.id}/stats?t=` + new Date().getTime());
                    if (!response.ok) return;

                    const data = await response.json();

                    document.getElementById(`val-empty-${cam.id}`).innerText = data.empty || 0;
                    document.getElementById(`val-normal-${cam.id}`).innerText = data.normal || 0;
                    document.getElementById(`val-violation-${cam.id}`).innerText = data.violation || 0;

                    const logsList = document.getElementById(`logs-list-${cam.id}`);
                    if (data.logs && data.logs.length > 0) {
                        let html = '';
                        data.logs.slice().reverse().forEach(log => {
                            html += `
                                <div style="font-size:12px; margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid #333;">
                                    <span style="color:#aaa;">${log.time}</span> 
                                    <span style="color:#ff6b6b;">#${log.id}</span> - ${log.type}
                                </div>
                            `;
                        });
                        logsList.innerHTML = html;
                    } else {
                        logsList.innerHTML = `<div style="font-size:12px; color:#28a745;">No active violations. All clear!</div>`;
                    }
                } catch (error) {
                    // console.error(\`Stats error for cam \${cam.id}:\`, error);
                }
            });
        }

        // Initialize multiple cameras layout
        document.addEventListener('DOMContentLoaded', initCameras);
    </script>
</body>

</html>
